<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404: System Failure | M5+</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --glitch-color-1: #00ff41; /* Matrix Green */
            --glitch-color-2: #ff0055; /* Error Red */
            --bg-color: #050505;
            --text-color: #e0e0e0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Space Mono', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        .glitch-wrapper {
            position: relative;
        }

        h1 {
            font-size: 8rem;
            margin: 0;
            line-height: 1;
            position: relative;
            color: var(--text-color);
        }

        h1::before,
        h1::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        h1::before {
            left: 2px;
            text-shadow: -2px 0 var(--glitch-color-2);
            clip: rect(24px, 550px, 90px, 0);
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }

        h1::after {
            left: -2px;
            text-shadow: -2px 0 var(--glitch-color-1);
            clip: rect(85px, 550px, 140px, 0);
            animation: glitch-anim 2.5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(10px, 9999px, 30px, 0); }
            20% { clip: rect(80px, 9999px, 100px, 0); }
            40% { clip: rect(20px, 9999px, 60px, 0); }
            60% { clip: rect(120px, 9999px, 140px, 0); }
            80% { clip: rect(50px, 9999px, 80px, 0); }
            100% { clip: rect(10px, 9999px, 120px, 0); }
        }

        @keyframes glitch-anim-2 {
            0% { clip: rect(80px, 9999px, 100px, 0); }
            20% { clip: rect(10px, 9999px, 50px, 0); }
            40% { clip: rect(120px, 9999px, 140px, 0); }
            60% { clip: rect(50px, 9999px, 90px, 0); }
            80% { clip: rect(10px, 9999px, 30px, 0); }
            100% { clip: rect(90px, 9999px, 110px, 0); }
        }

        p {
            font-size: 1.5rem;
            margin-top: 1rem;
            margin-bottom: 3rem;
            opacity: 0.8;
            max-width: 600px;
            padding: 0 1rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 3rem;
            background: transparent;
            border: 1px solid var(--glitch-color-1);
            color: var(--glitch-color-1);
            text-decoration: none;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            background: rgba(0, 255, 65, 0.1);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.4);
            transform: translateY(-2px);
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 65, 0.2), transparent);
            transition: 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .coordinates {
            position: absolute;
            bottom: 2rem;
            font-size: 0.8rem;
            opacity: 0.5;
            animation: blink 2s infinite;
        }

        @keyframes blink { 50% { opacity: 0.1; } }

        /* Scanline Overlay */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="scanlines"></div>

    <div class="glitch-wrapper">
        <h1 data-text="404">404</h1>
    </div>
    
    <p>SYSTEM FAILURE. COORDINATES UNKNOWN.</p>

    <a href="index.html" class="btn">
        <i class="fa-solid fa-house-signal"></i> Return to Base
    </a>

    <div class="coordinates" id="coords">NULL_POINTER_EXCEPTION at 0x00404</div>

    <script>
        // Random Coordinate Generator
        setInterval(() => {
            const hex = Math.floor(Math.random() * 0xFFFFFF).toString(16).toUpperCase();
            document.getElementById('coords').textContent = `ERR_CONNECTION_LOST at 0x${hex}`;
        }, 100);
    </script>
</body>
</html>
